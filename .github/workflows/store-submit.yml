name: Publish to MS Store

on:
  workflow_dispatch: # 수동으로 조용히 실행할 수 있는 버튼 추가!
  push:
    tags:
      - 'v*' # Trigger workflow when a version tag (e.g., v1.1.3) is pushed

jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm install

      - name: Install Tauri-CLI
        run: cargo install tauri-cli --version "^2.0.0"

      - name: Build MSIX Bundle
        run: npm run tauri:windows:build

      - name: Publish to Microsoft Store
        uses: microsoft/microsoft-store-apppublisher@v1
        with:
          tenantId: ${{ secrets.AZURE_TENANT_ID }}
          clientId: ${{ secrets.AZURE_CLIENT_ID }}
          clientSecret: ${{ secrets.AZURE_CLIENT_SECRET }}
          sellerId: ${{ secrets.MSSTORE_SELLER_ID }}
          productId: '9NPVXL622ZQQ' # HyperDesk Store ID (From your screenshot)
          packagePath: 'src-tauri/target/msix/HyperDesk_*.msixbundle'

      - name: Create GitHub Release & Upload Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: 'src-tauri/target/msix/HyperDesk_*.msixbundle'
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
