name: Publish to MS Store

on:
  workflow_dispatch: # 수동으로 조용히 실행할 수 있는 버튼 추가!
  push:
    tags:
      - 'v*' # Trigger workflow when a version tag (e.g., v1.1.3) is pushed

jobs:
  build-and-publish:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm install

      - name: Install Tauri-CLI
        run: cargo install tauri-cli --version "^2.0.0"

      - name: Build MSIX Bundle
        run: npm run tauri:windows:build

      - name: Setup MS Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1

      - name: Publish to Microsoft Store
        run: |
          msstore reconfigure --tenantId "${{ secrets.AZURE_TENANT_ID }}" --clientId "${{ secrets.AZURE_CLIENT_ID }}" --clientSecret "${{ secrets.AZURE_CLIENT_SECRET }}" --sellerId "${{ secrets.MSSTORE_SELLER_ID }}"
          $msix = Get-ChildItem -Path "src-tauri/target/msix" -Filter "*.msixbundle" | Select-Object -First 1
          msstore publish $msix.FullName -id 9NPVXL622ZQQ

      - name: Create GitHub Release & Upload Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: 'src-tauri/target/msix/*.msixbundle'
          generate_release_notes: true
          body: |
            ## 설치 (Microsoft Store)

            👉 **https://apps.microsoft.com/detail/9NPVXL622ZQQ**

            Store 버전은 Microsoft가 서명·검증하며 자동으로 업데이트됩니다.

            > ⚠️ 아래 첨부된 `.msixbundle`은 Store 제출용 **미서명 원본 아티팩트**입니다.
            > 서명되어 있지 않아 직접 설치되지 않습니다 — 반드시 위 Store 링크로 받으세요.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
